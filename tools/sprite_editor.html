<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Game Sprite Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111; color: #ddd; height: 100vh; display: flex; flex-direction: column; user-select: none; }

/* ── Header ── */
.header { background: #1a1a2e; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #333; flex-shrink: 0; }
.header h1 { font-size: 16px; color: #0af; font-weight: 600; }
.toolbar { display: flex; gap: 6px; }
.toolbar button { background: #2a2a3e; color: #ddd; border: 1px solid #444; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #3a3a5e; }
.toolbar button.primary { background: #0af; color: #000; border-color: #0af; font-weight: 600; }
.toolbar button.primary:hover { background: #3cf; }
.header .spacer { flex: 1; }
.header .info { font-size: 12px; color: #888; display: flex; gap: 16px; align-items: center; }
.header .info input { background: #222; border: 1px solid #444; color: #ddd; padding: 2px 8px; border-radius: 3px; font-size: 12px; width: 140px; }

/* ── Main Layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Left: Palette ── */
.palette { width: 170px; background: #16162a; border-right: 2px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
.palette h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; padding: 10px 12px 4px; }
.palette-group { padding: 2px 8px 6px; }
.palette-group label { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }
.palette-group .chars { display: flex; flex-wrap: wrap; gap: 2px; }
.palette-group .chars .c { width: 32px; height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; font-family: monospace; background: #1e1e34; border: 1px solid #333; border-radius: 3px; cursor: pointer; line-height: 1; }
.palette-group .chars .c .glyph { font-size: 16px; font-family: Consolas, "Courier New", monospace; }
.palette-group .chars .c .label { font-size: 8px; color: #555; }
.palette-group .chars .c:hover { border-color: #0af; }
.palette-group .chars .c.active { border-color: #0af; background: #0af22; box-shadow: 0 0 6px #0af4; }
.palette-group .chars .c.eraser { color: #555; font-size: 11px; }
.palette-divider { border: none; border-top: 1px solid #2a2a3e; margin: 4px 12px; }

/* ── Center: Editor ── */
.editor-area { flex: 1; display: flex; flex-direction: column; background: #0d0d1a; overflow: hidden; }
.editor-tabs { display: flex; background: #16162a; border-bottom: 2px solid #333; flex-shrink: 0; }
.editor-tabs button { background: transparent; color: #666; border: none; padding: 8px 20px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.editor-tabs button:hover { color: #aaa; }
.editor-tabs button.active { color: #0af; border-bottom-color: #0af; }
.editor-viewport { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; }
.grid-wrap { position: relative; display: inline-block; }
.grid-wrap canvas { display: block; image-rendering: pixelated; cursor: crosshair; }

/* ── Right: Properties ── */
.props { width: 200px; background: #16162a; border-left: 2px solid #333; padding: 12px; overflow-y: auto; flex-shrink: 0; }
.props h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.props label { font-size: 11px; color: #888; display: block; margin-top: 8px; margin-bottom: 2px; }
.props input[type="text"], .props input[type="number"] { width: 100%; background: #222; border: 1px solid #444; color: #ddd; padding: 4px 8px; border-radius: 3px; font-size: 12px; }
.props .color-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; padding: 2px 4px; border-radius: 3px; cursor: pointer; }
.props .color-row:hover { background: #1e1e34; }
.props .color-row .swatch { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #444; flex-shrink: 0; }
.props .color-row .key { font-size: 12px; color: #aaa; width: 16px; text-align: right; font-family: monospace; }
.props .color-row .val { font-size: 10px; color: #666; font-family: monospace; }
.props .thruster-list { max-height: 200px; overflow-y: auto; }
.props .thruster-list .t-entry { font-size: 11px; color: #aaa; padding: 2px 4px; font-family: monospace; }

/* ── Modals ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #1a1a2e; border: 1px solid #444; border-radius: 8px; padding: 24px; min-width: 400px; max-width: 560px; }
.modal h2 { font-size: 18px; margin-bottom: 16px; color: #0af; }
.modal label { display: block; font-size: 12px; color: #888; margin: 8px 0 3px; }
.modal input, .modal select { width: 100%; background: #222; border: 1px solid #444; color: #ddd; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
.modal .row { display: flex; gap: 12px; }
.modal .row > * { flex: 1; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal .actions button { padding: 6px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.modal .actions .btn-cancel { background: #333; color: #aaa; border: 1px solid #555; }
.modal .actions .btn-ok { background: #0af; color: #000; border: 1px solid #0af; font-weight: 600; }
.modal .class-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
.modal .class-card { background: #222; border: 2px solid #333; border-radius: 6px; padding: 10px; cursor: pointer; text-align: center; }
.modal .class-card:hover { border-color: #555; }
.modal .class-card.selected { border-color: #0af; background: #0af12; }
.modal .class-card .name { font-size: 14px; font-weight: 600; color: #ddd; }
.modal .class-card .size { font-size: 11px; color: #888; margin-top: 2px; }
.modal .dim-hint { font-size: 11px; color: #666; margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>Sprite Editor</h1>
  <div class="toolbar">
    <button class="primary" onclick="showNewShipModal()">+ New</button>
    <button onclick="openFile()">Open</button>
    <button onclick="saveFile()">Save</button>
    <button id="overlayBtn" onclick="toggleOverlay()" style="border-color:#555;color:#666">Overlay</button>
    <button id="symmetryBtn" onclick="toggleSymmetry()" style="border-color:#555;color:#666">Sym: Off</button>
  </div>
  <div class="spacer"></div>
  <div class="info">
    <span id="shipName">Unnamed</span>
    <span id="shipDims">0x0</span>
  </div>
</div>

<div class="main">
  <!-- Palette -->
  <div class="palette" id="palette"></div>

  <!-- Editor -->
  <div class="editor-area">
    <div class="editor-tabs">
      <button class="active" data-layer="exterior" onclick="setLayer('exterior')">Exterior</button>
      <button data-layer="interior" onclick="setLayer('interior')">Interior</button>
      <button data-layer="preview" onclick="setLayer('preview')">Preview</button>
    </div>
    <div class="editor-viewport" id="viewport">
      <div class="grid-wrap">
        <canvas id="gridCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Properties -->
  <div class="props" id="props"></div>
</div>

<!-- New Ship Modal -->
<div class="modal-overlay" id="newShipModal">
  <div class="modal">
    <h2>New Ship</h2>
    <label>Ship Name</label>
    <input id="newShipName" value="My Ship" oninput="updateNewShipDims()">
    <label>Class</label>
    <div class="class-cards" id="classCards"></div>
    <div class="row">
      <div><label>Width</label><input type="number" id="newShipW" min="5" max="99" value="35"></div>
      <div><label>Height</label><input type="number" id="newShipH" min="5" max="60" value="30"></div>
    </div>
    <div class="dim-hint" id="dimHint">Recommended for this class</div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeModal('newShipModal')">Cancel</button>
      <button class="btn-ok" onclick="createNewShip()">Create</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
const HANDLE_PAD = 16;
// ═══════════════════════════════════════════════════════════════
// COLOR PALETTE (game default)
// ═══════════════════════════════════════════════════════════════
const DEFAULT_COLORS = {
  a: [0.55, 0.55, 0.62], // light gray   - hull, thick walls
  b: [0.40, 0.40, 0.48], // medium gray  - border, panel lines
  c: [0.30, 0.80, 1.00], // cyan         - windows, airlocks
  d: [0.50, 0.50, 0.58], // darker gray  - damage
  e: [0.65, 0.65, 0.72], // lightest gray - floor
  f: [0.80, 0.20, 0.20], // red          - thruster nozzles
  g: [0.20, 0.25, 0.35], // dark slate   - captain's seat
  h: [0.10, 0.50, 0.90], // blue         - energy, consoles
};

// Character -> color key mapping
const CHAR_COLOR = {
  '#': 'a', '@': 'b', '/': 'b', '\\': 'b',
  '.': 'e', '[': 'a', ']': 'a', '{': 'a', '}': 'a',
  '=': 'a', '!': 'b', '+': 'b', '~': 'h', 'C': 'g',
  'o': 'c', '-': 'b', '|': 'a', '*': 'h', 'A': 'c',
  'v': 'f', '^': 'f', '<': 'f', '>': 'f',
  'S': 'h', 'E': 'f',
};

const CHAR_DESC = {
  '#': 'armor', '@': 'hull', '/': 'slant_se', '\\': 'slant_sw',
  '.': 'deck', '[': 'corner_tl', ']': 'corner_tr', '{': 'corner_bl', '}': 'corner_br',
  '=': 'hwall', '!': 'vwall', '+': 'junction', '~': 'conduit', 'C': 'captain',
  'o': 'window', '-': 'hpanel', '|': 'vpanel', '*': 'console', 'A': 'airlock',
  'v': 'thruster_d', '^': 'thruster_u', '<': 'thruster_l', '>': 'thruster_r',
  'S': 'shield', 'E': 'engine',
};

// ASCII → rendered glyph (matches ship.lua CHAR_TO_GLYPH)
const CHAR_TO_GLYPH = {
  '#': '█', '@': '▓', '.': '░',
  '/': '╱', '\\': '╲',
  '=': '═', '|': '║', '-': '─', '!': '│',
  '+': '┼', '~': '~',
  '[': '╔', ']': '╗', '{': '╚', '}': '╝',
  'o': 'O', '*': '◆',
  'v': '▼', '^': '▲', '<': '◄', '>': '►',
  'A': 'A', 'C': 'C',
  'S': '◈', 'E': '⊞',
};
function glyph(ch) { return CHAR_TO_GLYPH[ch] || ch; }

// Canonical type names for property assignment (matches ship.lua CHAR_TYPE)
const CHAR_TYPE = {
  '#': 'armor', '@': 'hull', '.': 'deck',
  '/': 'slant_se', '\\': 'slant_sw',
  '=': 'hwall', '|': 'vwall', '-': 'hpanel', '!': 'vpanel',
  '+': 'junction', '~': 'conduit',
  '[': 'corner_tl', ']': 'corner_tr', '{': 'corner_bl', '}': 'corner_br',
  'o': 'window', '*': 'console',
  'v': 'thruster_d', '^': 'thruster_u', '<': 'thruster_l', '>': 'thruster_r',
  'A': 'airlock', 'C': 'captain',
  'S': 'shield', 'E': 'engine',
};

// Group definitions for palette
const PALETTE_GROUPS = [
  { label: 'Hull (Exterior)', chars: ['#', '@', '/', '\\'] },
  { label: 'Interior', chars: ['.', '[', ']', '{', '}', '=', '!', '+', '~', 'C', 'S', 'E'] },
  { label: 'Shared', chars: ['o', '-', '|', '*', 'A'] },
  { label: 'Thrusters', chars: ['v', '^', '<', '>'] },
];

// Which palette group indices are visible per layer
const LAYER_GROUPS = {
  exterior: [0, 2, 3], // Hull, Shared, Thrusters
  interior: [1, 2],    // Interior, Shared
  preview: [0, 2, 3],  // same as exterior for palette
};

const CLASSES = [
  { id: 'scout',     name: 'Scout',     w: 15, h: 24, desc: '9-15 wide, 20-28 tall', tip: 'Narrow needle, fast taper' },
  { id: 'frigate',   name: 'Frigate',   w: 25, h: 32, desc: '17-25 wide, 28-36 tall', tip: 'Elongated wedge, moderate taper' },
  { id: 'freighter', name: 'Freighter', w: 35, h: 34, desc: '25-40 wide, 30-38 tall', tip: 'Wide rectangle, blunt bow' },
  { id: 'battlecruiser', name: 'Battlecruiser', w: 45, h: 38, desc: '35-55 wide, 36-40 tall', tip: 'Massive wedge, heavy detail' },
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let S = {
  name: 'New Ship',
  font_size: 24,
  width: 35,
  height: 30,
  exterior: [],
  interior: [],
  thrusters: [],
  colors: JSON.parse(JSON.stringify(DEFAULT_COLORS)),
  activeLayer: 'exterior',
  selectedChar: '#',
  cellSize: 20,
  showOverlay: false,
  symmetry: false,
  symmetryLine: 17.5,
  symmetryAxis: 17.0,
  draggingAxis: false,
};

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
window.onload = function() {
  buildPalette();
  buildProps();
  buildClassCards();
  initBlankShip(35, 30);
  renderAll();
};

// ═══════════════════════════════════════════════════════════════
// PALETTE
// ═══════════════════════════════════════════════════════════════
function buildPalette() {
  const el = document.getElementById('palette');
  el.innerHTML = '<h3>Palette</h3>';
  const visible = LAYER_GROUPS[S.activeLayer] || [0, 1, 2, 3];
  PALETTE_GROUPS.forEach((g, gi) => {
    if (!visible.includes(gi)) return;
    const div = document.createElement('div');
    div.className = 'palette-group';
    div.innerHTML = `<label>${g.label}</label><div class="chars">` +
      g.chars.map(c => `<div class="c${c === S.selectedChar ? ' active' : ''}" data-char="${c}" onclick="selectChar('${c}')" title="${c} = ${CHAR_DESC[c] || ''}"><span class="glyph">${glyph(c)}</span><span class="label">${c}</span></div>`).join('') +
      `</div>`;
    el.appendChild(div);
    if (gi < PALETTE_GROUPS.length - 1) {
      el.appendChild(document.createElement('hr')).className = 'palette-divider';
    }
  });
  // Eraser
  const eg = document.createElement('div');
  eg.className = 'palette-group';
  eg.innerHTML = `<label>Erase</label><div class="chars"><div class="c eraser${S.selectedChar === ' ' ? ' active' : ''}" data-char=" " onclick="selectChar(' ')">␣</div></div>`;
  el.appendChild(eg);
}

function selectChar(c) {
  S.selectedChar = c;
  document.querySelectorAll('.palette-group .c').forEach(el => {
    el.classList.toggle('active', el.dataset.char === c);
  });
}

// ═══════════════════════════════════════════════════════════════
// PROPERTIES PANEL
// ═══════════════════════════════════════════════════════════════
function buildProps() {
  const el = document.getElementById('props');
  let html = '<h3>Ship</h3>';
  html += `<label>Name</label><input type="text" id="propName" value="${S.name}" onchange="S.name=this.value;updateHeader()">`;
  html += `<label>Font Size</label><input type="number" id="propFontSize" value="${S.font_size}" min="8" max="64" onchange="S.font_size=+this.value;renderAll()">`;
  html += `<label>Grid</label><div style="font-size:12px;color:#888"><span id="propDims">${S.width}&times;${S.height}</span></div>`;
  html += '<h3 style="margin-top:12px">Colors</h3>';
  const keys = 'abcdefgh';
  for (const k of keys) {
    const c = S.colors[k];
    const hex = rgbToHex(c[0], c[1], c[2]);
    html += `<div class="color-row" onclick="editColor('${k}')" title="${CHAR_DESC_OF_KEY(k)}">`;
    html += `<div class="key">${k}</div>`;
    html += `<div class="swatch" style="background:${hex}"></div>`;
    html += `<div class="val">${hex}</div>`;
    html += `</div>`;
  }
  html += '<h3 style="margin-top:12px">Thrusters</h3>';
  html += '<div class="thruster-list" id="thrusterList"></div>';
  if (S.activeLayer === 'preview') {
    const thr = S.thrusters[0];
    const pct = thr ? Math.round((thr.throttle || 1) * 100) : 100;
    html += '<label style="margin-top:8px">Throttle</label>';
    html += `<input type="range" min="0" max="100" value="${pct}" id="throttleSlider" oninput="setThrottle(+this.value)" style="width:100%;accent-color:#0af">`;
    html += `<div style="text-align:center;font-size:13px;color:#0af" id="throttleVal">${pct}%</div>`;
  }
  el.innerHTML = html;
  updateThrusterList();
}

function CHAR_DESC_OF_KEY(k) {
  const map = { a: 'Hull', b: 'Border', c: 'Cyan', d: 'Damage', e: 'Floor', f: 'Thruster', g: 'Seat', h: 'Energy' };
  return map[k] || '';
}

function updateThrusterList() {
  const el = document.getElementById('thrusterList');
  if (!el) return;
  el.innerHTML = S.thrusters.map((t, i) =>
    `<div class="t-entry">${i+1}. row ${t.row}, col ${t.col}, ${t.dir}</div>`
  ).join('') || '<div style="font-size:11px;color:#555">No thrusters</div>';
}

function rgbToHex(r, g, b) {
  const to = v => Math.round(v * 255).toString(16).padStart(2, '0');
  return '#' + to(r) + to(g) + to(b);
}

function editColor(key) {
  const c = S.colors[key];
  const hex = rgbToHex(c[0], c[1], c[2]);
  const input = document.createElement('input');
  input.type = 'color';
  input.value = hex;
  input.oninput = function() {
    const r = parseInt(this.value.slice(1,3),16)/255;
    const g = parseInt(this.value.slice(3,5),16)/255;
    const b = parseInt(this.value.slice(5,7),16)/255;
    S.colors[key] = [r, g, b];
    buildProps();
    renderAll();
  };
  input.click();
}

// ═══════════════════════════════════════════════════════════════
// LAYER MANAGEMENT
// ═══════════════════════════════════════════════════════════════
let animFrame = null;

function toggleOverlay() {
  S.showOverlay = !S.showOverlay;
  const btn = document.getElementById('overlayBtn');
  if (S.showOverlay) {
    btn.style.borderColor = '#0af';
    btn.style.color = '#0af';
  } else {
    btn.style.borderColor = '#555';
    btn.style.color = '#666';
  }
  renderGrid();
}

function toggleSymmetry() {
  S.symmetry = !S.symmetry;
  const btn = document.getElementById('symmetryBtn');
  btn.style.borderColor = S.symmetry ? '#0af' : '#555';
  btn.style.color = S.symmetry ? '#0af' : '#666';
  btn.textContent = S.symmetry ? 'Sym: On' : 'Sym: Off';
  renderGrid();
}

function setLayer(layer) {
  // Stop preview animation if leaving
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  S.activeLayer = layer;
  document.querySelectorAll('.editor-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.layer === layer);
  });
  buildPalette();
  buildProps();
  const visible = LAYER_GROUPS[layer] || [0, 1, 2, 3];
  const avail = visible.flatMap(gi => PALETTE_GROUPS[gi].chars);
  if (!avail.includes(S.selectedChar) && S.selectedChar !== ' ') {
    selectChar(avail[0] || '#');
  }
  renderAll();

  // Start preview animation
  if (layer === 'preview') {
    S.previewTime = 0;
    previewLoop();
  }
}

function previewLoop() {
  S.previewTime = (S.previewTime || 0) + 0.016;
  renderGrid(S.previewTime);
  animFrame = requestAnimationFrame(previewLoop);
}

// ═══════════════════════════════════════════════════════════════
// GRID RENDERING (Canvas)
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  renderGrid();
  updateHeader();
  updatePropDims();
}

function getActiveGrid() {
  if (S.activeLayer === 'exterior' || S.activeLayer === 'preview') return S.exterior;
  if (S.activeLayer === 'interior') return S.interior;
  return S.exterior;
}

function drawGridOnCtx(ctx, grid) {
  const cs = S.cellSize;
  for (let r = 0; r < S.height; r++) {
    for (let c = 0; c < S.width; c++) {
      const ch = (grid[r] && grid[r][c]) || ' ';
      const x = c * cs, y = r * cs;

      if (ch !== ' ') {
        const ck = CHAR_COLOR[ch];
        const col = ck ? S.colors[ck] : [0.5, 0.5, 0.5];
        const hex = rgbToHex(col[0], col[1], col[2]);

        const fillChars = new Set(['#', '@', '.']);
        if (ch === '/') {
          ctx.fillStyle = hex;
          ctx.beginPath();
          ctx.moveTo(x, y + cs);
          ctx.lineTo(x + cs, y + cs);
          ctx.lineTo(x + cs, y);
          ctx.fill();
        } else if (ch === '\\') {
          ctx.fillStyle = hex;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x, y + cs);
          ctx.lineTo(x + cs, y + cs);
          ctx.fill();
        } else if (fillChars.has(ch)) {
          ctx.fillStyle = hex;
          ctx.fillRect(x, y, cs, cs);
        } else {
          ctx.font = `${cs-3}px Consolas, "Courier New", monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = hex;
          ctx.fillText(glyph(ch), x + cs/2, y + cs/2);
        }
      } else {
        ctx.strokeStyle = '#ffffff08';
        ctx.strokeRect(x, y, cs, cs);
      }
    }
  }
}

function renderGrid(previewTime) {
  const canvas = document.getElementById('gridCanvas');
  const cs = S.cellSize;
  const w = S.width * cs;
  const h = S.height * cs + HANDLE_PAD;
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, w, h);

  // Handle bar background
  ctx.fillStyle = '#12121e';
  ctx.fillRect(0, 0, w, HANDLE_PAD);

  const grid = getActiveGrid();

  // Translate all grid content below the handle bar
  ctx.save();
  ctx.translate(0, HANDLE_PAD);

  // Draw overlay (other layer) if toggled on
  if (S.showOverlay && S.activeLayer !== 'preview') {
    const otherGrid = S.activeLayer === 'exterior' ? S.interior : S.exterior;
    ctx.globalAlpha = 0.2;
    drawGridOnCtx(ctx, otherGrid);
    ctx.globalAlpha = 1;
  }

  // Draw active grid on top
  drawGridOnCtx(ctx, grid);

  // Preview: animated thruster flames
  if (S.activeLayer === 'preview' && previewTime != null) {
    for (const t of S.thrusters) {
      drawFlame(ctx, t, previewTime, cs);
    }
  }

  ctx.restore();

  // Symmetry axis line (canvas-absolute, spans full height)
  if (S.symmetry) {
    const ax = S.symmetryLine * cs;
    ctx.strokeStyle = 'rgba(0,170,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(ax, 0);
    ctx.lineTo(ax, h);
    ctx.stroke();
    ctx.setLineDash([]);
    // Drag handle in the handle bar
    const hy = HANDLE_PAD / 2;
    ctx.fillStyle = 'rgba(0,170,255,0.8)';
    ctx.beginPath();
    ctx.arc(ax, hy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ax, hy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateHeader() {
  document.getElementById('shipName').textContent = S.name;
  document.getElementById('shipDims').textContent = `${S.width}x${S.height}`;
}

function updatePropDims() {
  const el = document.getElementById('propDims');
  if (el) el.textContent = `${S.width}x${S.height}`;
}

// ═══════════════════════════════════════════════════════════════
// MOUSE INTERACTION
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('gridCanvas');
  let painting = false;

  canvas.addEventListener('mousedown', function(e) {
    if (S.symmetry && nearAxis(e)) {
      S.draggingAxis = true;
      return;
    }
    painting = true;
    paintAt(e);
  });
  canvas.addEventListener('mousemove', function(e) {
    if (S.draggingAxis) { dragAxis(e); return; }
    if (painting) { paintAt(e); return; }
    canvas.style.cursor = (S.symmetry && nearAxis(e)) ? 'col-resize' : 'crosshair';
  });
  canvas.addEventListener('mouseup', () => { painting = false; S.draggingAxis = false; });
  canvas.addEventListener('mouseleave', () => { painting = false; S.draggingAxis = false; });
  canvas.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    const r = Math.floor((e.offsetY - HANDLE_PAD) / S.cellSize);
    const c = Math.floor(e.offsetX / S.cellSize);
    if (r >= 0 && r < S.height && c >= 0 && c < S.width) {
      placeWithSymmetry(r, c, ' ');
      renderAll();
    }
  });
});

function nearAxis(e) {
  const lx = S.symmetryLine * S.cellSize;
  const my = e.offsetY;
  return my >= 0 && my < HANDLE_PAD && Math.abs(e.offsetX - lx) < 8;
}

function dragAxis(e) {
  const col = Math.max(0, Math.min(S.width - 1, e.offsetX / S.cellSize));
  S.symmetryLine = Math.round(col * 2) / 2;
  S.symmetryAxis = S.symmetryLine - 0.5;
  renderGrid();
}

function placeWithSymmetry(r, c, ch) {
  setCell(r, c, ch);
  if (S.symmetry) {
    const mc = Math.round(2 * S.symmetryAxis - c);
    if (mc >= 0 && mc < S.width && mc !== c) {
      setCell(r, mc, ch);
    }
  }
}

function paintAt(e) {
  if (S.activeLayer === 'preview') return;
  const canvas = document.getElementById('gridCanvas');
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const r = Math.floor((y - HANDLE_PAD) / S.cellSize);
  const c = Math.floor(x / S.cellSize);
  if (r >= 0 && r < S.height && c >= 0 && c < S.width) {
    placeWithSymmetry(r, c, S.selectedChar);
    renderAll();
  }
}

function setCell(row, col, ch) {
  const grid = getActiveGrid();
  if (!grid[row]) grid[row] = new Array(S.width).fill(' ');
  grid[row][col] = ch;

  // If placing thruster on exterior, auto-manage thruster list
  if (S.activeLayer === 'exterior') {
    autoUpdateThrusters();
  }
}

// ═══════════════════════════════════════════════════════════════
// PREVIEW: ANIMATED THRUSTER FLAMES
// ═══════════════════════════════════════════════════════════════
function setCtxColor(ctx, r, g, b, a) {
  if (a != null) ctx.fillStyle = `rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},${a})`;
  else ctx.fillStyle = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}

function drawFlame(ctx, thr, t, fs) {
  const dir = thr.dir;
  const throttle = thr.throttle || 1;
  // thruster row/col are 1-indexed in the file, convert to 0-indexed pixel center
  const cx = (thr.col - 1) * fs + fs / 2;
  const cy = (thr.row - 1) * fs + fs / 2;

  const flicker = Math.sin(t * 18 + thr.row * 3.1 + thr.col * 7.3) * 0.15 + 0.85;
  const len = Math.max(2, Math.floor(
    (2 + throttle * 4) + Math.sin(t * 9 + thr.row * 5 + thr.col * 3) * 1.2
  ));

  // Glow circle at base
  setCtxColor(ctx, 1.0, 0.45, 0.05, 0.18 * flicker * throttle);
  ctx.beginPath();
  ctx.arc(cx, cy, fs * 0.9 * throttle, 0, Math.PI * 2);
  ctx.fill();

  // Flame segments
  for (let i = 1; i <= len; i++) {
    const frac = (i - 1) / Math.max(len - 1, 1);
    const intensity = (1.0 - frac * 0.9) * flicker * throttle;
    const wobble = Math.sin(t * 14 + i * 2.3 + thr.col * 1.7) * (fs * 0.08);

    let cr, cg, cb;
    if (frac < 0.5) {
      const f2 = frac * 2;
      cr = 1.0;
      cg = 0.95 - f2 * 0.50;
      cb = 0.60 - f2 * 0.55;
    } else {
      const f2 = (frac - 0.5) * 2;
      cr = 1.0 - f2 * 0.30;
      cg = 0.45 - f2 * 0.40;
      cb = 0.05;
    }
    setCtxColor(ctx, cr * intensity, cg * intensity, cb * intensity);

    const hw = (fs * 0.4) * (1.0 - frac * 0.95);

    if (dir === 'down') {
      const py = cy + (i - 1) * fs * 0.52;
      ctx.beginPath();
      ctx.moveTo(cx + wobble, py);
      ctx.lineTo(cx - hw + wobble, py + fs * 0.5);
      ctx.lineTo(cx + hw + wobble, py + fs * 0.5);
      ctx.fill();
    } else if (dir === 'up') {
      const py = cy - (i - 1) * fs * 0.52;
      ctx.beginPath();
      ctx.moveTo(cx + wobble, py);
      ctx.lineTo(cx - hw + wobble, py - fs * 0.5);
      ctx.lineTo(cx + hw + wobble, py - fs * 0.5);
      ctx.fill();
    } else if (dir === 'left') {
      const px = cx - (i - 1) * fs * 0.52;
      ctx.beginPath();
      ctx.moveTo(px, cy + wobble);
      ctx.lineTo(px - fs * 0.5, cy - hw + wobble);
      ctx.lineTo(px - fs * 0.5, cy + hw + wobble);
      ctx.fill();
    } else if (dir === 'right') {
      const px = cx + (i - 1) * fs * 0.52;
      ctx.beginPath();
      ctx.moveTo(px, cy + wobble);
      ctx.lineTo(px + fs * 0.5, cy - hw + wobble);
      ctx.lineTo(px + fs * 0.5, cy + hw + wobble);
      ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// THRUSTERS
// ═══════════════════════════════════════════════════════════════
const THRUSTER_CHARS = { v: 'down', '^': 'up', '<': 'left', '>': 'right' };
const THRUSTER_REVERSE = { down: 'v', up: '^', left: '<', right: '>' };

function setThrottle(pct) {
  const val = pct / 100;
  for (const t of S.thrusters) t.throttle = val;
  document.getElementById('throttleVal').textContent = pct + '%';
}

function autoUpdateThrusters() {
  const found = [];
  for (let r = 0; r < S.height; r++) {
    const row = S.exterior[r] || [];
    for (let c = 0; c < S.width; c++) {
      const ch = row[c];
      const dir = THRUSTER_CHARS[ch];
      if (dir) {
        found.push({ row: r + 1, col: c + 1, dir });
      }
    }
  }
  S.thrusters = found;
  updateThrusterList();
}

// ═══════════════════════════════════════════════════════════════
// NEW SHIP WIZARD
// ═══════════════════════════════════════════════════════════════
let selectedClass = 'frigate';

function buildClassCards() {
  const el = document.getElementById('classCards');
  el.innerHTML = CLASSES.map(cls =>
    `<div class="class-card${cls.id === selectedClass ? ' selected' : ''}" onclick="selectClass('${cls.id}')">
      <div class="name">${cls.name}</div>
      <div class="size">${cls.desc}</div>
    </div>`
  ).join('');
}

function selectClass(id) {
  selectedClass = id;
  document.querySelectorAll('.class-card').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  updateNewShipDims();
}

function updateNewShipDims() {
  const cls = CLASSES.find(c => c.id === selectedClass);
  if (!cls) return;
  const wEl = document.getElementById('newShipW');
  const hEl = document.getElementById('newShipH');
  if (!wEl || !hEl) return;
  wEl.value = cls.w;
  hEl.value = cls.h;
  const hint = document.getElementById('dimHint');
  if (hint) hint.textContent = cls.tip + '. Recommended: ' + cls.w + 'x' + cls.h;
}

function showNewShipModal() {
  selectedClass = 'frigate';
  buildClassCards();
  updateNewShipDims();
  document.getElementById('newShipName').value = 'My Ship';
  document.getElementById('newShipModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function createNewShip() {
  const name = document.getElementById('newShipName').value || 'Unnamed';
  const w = parseInt(document.getElementById('newShipW').value) || 35;
  const h = parseInt(document.getElementById('newShipH').value) || 30;
  closeModal('newShipModal');
  initBlankShip(w, h);
  S.name = name;
  S.font_size = 24;
  document.getElementById('propName').value = name;
  document.getElementById('propFontSize').value = 24;
  buildProps();
  renderAll();
}

function initBlankShip(w, h) {
  S.width = w;
  S.height = h;
  S.exterior = [];
  S.interior = [];
  S.thrusters = [];
  S.symmetryLine = w / 2;
  S.symmetryAxis = w / 2 - 0.5;
  for (let r = 0; r < h; r++) {
    S.exterior[r] = new Array(w).fill(' ');
    S.interior[r] = new Array(w).fill(' ');
  }

  autoUpdateThrusters();
  renderAll();
}

function generateHull(w, h) {
  // Simple oval hull with @ border and # fill
  const cx = Math.floor(w / 2);
  const rx = Math.floor(w / 2) - 1;
  const ry = Math.floor(h / 2) - 1;

  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const dx = (c - cx) / rx;
      const dy = (r - (h-1)/2) / ry;
      const d = dx*dx + dy*dy;
      if (d <= 1.0) {
        // Check if this is on the border (approx)
        const d2 = ((c - cx) / (rx-0.5))**2 + ((r - (h-1)/2) / (ry-0.5))**2;
        if (d2 >= 0.85 && d <= 1.0) {
          // On boundary - use corner chars for taper
          if (r < h/2 && (c < cx - rx*0.3 || c > cx + rx*0.3)) {
            S.exterior[r][c] = r < 3 ? '@' : (c < cx ? '\\' : '/');
          } else {
            S.exterior[r][c] = '@';
          }
        } else if (d < 0.85) {
          S.exterior[r][c] = '#';
        }
      }
    }
  }

  // Ensure top has @ point
  let topRow = 0;
  for (let r = 0; r < h; r++) {
    const has = S.exterior[r].some(ch => ch !== ' ');
    if (has) { topRow = r; break; }
  }
  for (let c = 0; c < w; c++) {
    if (S.exterior[topRow][c] !== ' ') {
      S.exterior[topRow][c] = '@';
    }
  }

  // Copy border to interior
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const ch = S.exterior[r][c];
      if (ch === '@' || ch === '/' || ch === '\\') {
        S.interior[r][c] = '@';
      } else if (ch === '#') {
        S.interior[r][c] = '.';
      } else if (ch === 'A') {
        S.interior[r][c] = 'A';
      } else {
        S.interior[r][c] = ' ';
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// FILE SAVE/LOAD
// ═══════════════════════════════════════════════════════════════
function serializeShip() {
  const pad = (arr) => arr.map(row => {
    let s = (Array.isArray(row) ? row : new Array(S.width).fill(' ')).join('');
    while (s.length < S.width) s += ' ';
    return s;
  });

  const lines = [
    `name: ${S.name}`,
    `font_size: ${S.font_size}`,
    '',
    '[exterior]',
    ...pad(S.exterior),
    '',
    '[interior]',
    ...pad(S.interior),
    '',
    '[thrusters]',
    ...S.thrusters.map(t => `${t.row},${t.col},${t.dir}`),
    '',
  ];
  return lines.join('\n');
}

function saveFile() {
  const content = serializeShip();
  const filename = S.name.toLowerCase().replace(/\s+/g, '_') + '_ship.txt';
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function openFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      parseShipFile(ev.target.result);
    };
    reader.readAsText(file);
  };
  input.click();
}

function parseShipFile(content) {
  const lines = content.split(/\r?\n/);
  let section = null;
  const newShip = {
    name: 'Loaded Ship',
    font_size: 24,
    width: 0,
    height: 0,
    exterior: [],
    interior: [],
    thrusters: [],
  };

  for (const raw of lines) {
    const line = raw; // preserve trailing spaces for grid rows
    const trimmed = line.trim();

    if (trimmed === '' || trimmed.startsWith('#')) continue;

    if (trimmed.startsWith('[') && trimmed.endsWith(']')) {
      section = trimmed.slice(1, -1).toLowerCase();
      continue;
    }

    if (trimmed.startsWith('name:')) {
      newShip.name = trimmed.slice(5).trim();
      continue;
    }

    if (trimmed.startsWith('font_size:')) {
      newShip.font_size = parseInt(trimmed.slice(10).trim()) || 24;
      continue;
    }

    if (section === 'exterior') {
      newShip.exterior.push(line);
    } else if (section === 'interior') {
      newShip.interior.push(line);
    } else if (section === 'thrusters') {
      const m = trimmed.match(/^(\d+),(\d+),(down|up|left|right)$/);
      if (m) {
        newShip.thrusters.push({ row: +m[1], col: +m[2], dir: m[3] });
      }
    }
  }

  // Determine dimensions
  let maxW = 0;
  for (const row of newShip.exterior) {
    if (row.length > maxW) maxW = row.length;
  }
  for (const row of newShip.interior) {
    if (row.length > maxW) maxW = row.length;
  }

  newShip.width = Math.max(maxW, 1);
  newShip.height = Math.max(newShip.exterior.length, newShip.interior.length, 1);

  // Pad grids
  const pad = (arr, h, w) => {
    const out = [];
    for (let r = 0; r < h; r++) {
      const s = (r < arr.length ? arr[r] : '').padEnd(w, ' ');
      out[r] = s.split('');
    }
    return out;
  };

  S.name = newShip.name;
  S.font_size = newShip.font_size;
  S.width = newShip.width;
  S.height = newShip.height;
  S.exterior = pad(newShip.exterior, S.height, S.width);
  S.interior = pad(newShip.interior, S.height, S.width);
  S.thrusters = newShip.thrusters;
  S.symmetryLine = S.width / 2;
  S.symmetryAxis = S.width / 2 - 0.5;

  document.getElementById('propName').value = S.name;
  document.getElementById('propFontSize').value = S.font_size;

  buildProps();
  renderAll();
  setLayer('exterior');
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile(); }
  if (e.ctrlKey && e.key === 'o') { e.preventDefault(); openFile(); }
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); showNewShipModal(); }
  // Number keys for quick char selection
  const num = parseInt(e.key);
  if (num >= 1 && num <= 4) {
    const groups = PALETTE_GROUPS;
    const idx = num - 1;
    if (idx < groups.length && groups[idx].chars.length > 0) {
      selectChar(groups[idx].chars[0]);
    }
  }
  // Layer shortcuts
  if (e.key === '1' && !e.ctrlKey) setLayer('exterior');
  if (e.key === '2' && !e.ctrlKey) setLayer('interior');
  if (e.key === '3' && !e.ctrlKey) setLayer('preview');
  // Symmetry toggle
  if (e.key === 'm' && !e.ctrlKey) toggleSymmetry();
});

// ═══════════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════════
document.getElementById('viewport').addEventListener('wheel', function(e) {
  if (!e.ctrlKey) return;
  e.preventDefault();
  const delta = e.deltaY > 0 ? -1 : 1;
  S.cellSize = Math.max(10, Math.min(40, S.cellSize + delta * 2));
  renderGrid();
});
</script>
